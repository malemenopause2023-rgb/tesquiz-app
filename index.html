<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テストステロンクイズ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(160deg,#0a2e1a 0%,#0d3d2a 40%,#0a2a3d 100%); min-height: 100vh; padding: 16px; display: flex; align-items: flex-start; justify-content: center; }
    .container { max-width: 500px; width: 100%; padding-top: 16px; padding-bottom: 48px; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 20px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(100,200,120,0.2); }
    .badge { display: inline-block; background: linear-gradient(135deg,#1a7a3a,#2ecc71); color: white; font-size: 0.72rem; font-weight: 700; padding: 4px 14px; border-radius: 99px; margin-bottom: 14px; letter-spacing: 0.08em; }
    h1 { font-size: 1.6rem; font-weight: 900; color: #e8f5e9; margin-bottom: 8px; line-height: 1.4; }
    .desc { font-size: 0.85rem; color: #81c784; line-height: 1.8; margin-bottom: 20px; }
    .info-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .info-box-title { font-size: 0.78rem; font-weight: 700; color: #2ecc71; margin-bottom: 8px; }
    .info-box-body { font-size: 0.83rem; color: #81c784; line-height: 1.9; }
    .form-label { font-size: 0.82rem; font-weight: 700; color: #2ecc71; margin-bottom: 8px; display: block; }
    .age-select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(46,204,113,0.3); border-radius: 8px; color: #e8f5e9; font-family: 'Noto Sans JP', sans-serif; font-size: 0.88rem; outline: none; cursor: pointer; appearance: none; margin-bottom: 16px; }
    .age-select option { background: #1a2e1a; }
    .start-btn { width: 100%; padding: 18px; background: linear-gradient(135deg,#1a7a3a,#2ecc71); color: white; border: none; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
    .start-btn:hover { transform: translateY(-2px); }
    .line-btn { width: 100%; padding: 16px; background: #06C755; color: white; border: none; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .line-btn:hover { opacity: 0.9; }
    .skip-btn { width: 100%; padding: 12px; background: transparent; color: rgba(129,199,132,0.6); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .user-badge { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #2ecc71; font-weight: 700; margin-bottom: 16px; display: none; }
    .progress-wrap { margin-bottom: 20px; }
    .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 0.78rem; color: #2ecc71; font-weight: 700; }
    .progress-cat { font-size: 0.72rem; color: #81c784; background: rgba(46,204,113,0.1); padding: 2px 10px; border-radius: 99px; }
    .progress-bar { background: rgba(0,0,0,0.3); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#1a7a3a,#2ecc71); border-radius: 99px; transition: width 0.4s ease; }
    .question-block { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 20px; border: 1px solid rgba(100,200,120,0.15); }
    .q-num { font-size: 0.72rem; color: #2ecc71; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.08em; }
    .q-text { font-size: 1rem; font-weight: 700; color: #e8f5e9; line-height: 1.7; margin-bottom: 18px; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(100,200,120,0.2); border-radius: 10px; padding: 14px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; color: #a5d6a7; cursor: pointer; transition: all 0.18s; text-align: left; width: 100%; }
    .choice-btn:hover { background: rgba(46,204,113,0.1); border-color: #2ecc71; color: #e8f5e9; }
    .choice-btn.correct { background: rgba(46,204,113,0.2); border-color: #2ecc71; color: #2ecc71; font-weight: 700; }
    .choice-btn.wrong { background: rgba(231,76,60,0.15); border-color: #e74c3c; color: #e74c3c; font-weight: 700; }
    .choice-btn.disabled { cursor: not-allowed; pointer-events: none; }
    .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 700; display: none; }
    .feedback.correct { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .feedback.wrong { background: rgba(231,76,60,0.12); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .result-earth { text-align: center; font-size: 4rem; margin: 16px 0; }
    .result-score { text-align: center; font-size: 3rem; font-weight: 900; color: #2ecc71; margin: 8px 0; }
    .result-percent { text-align: center; font-size: 1.2rem; color: #81c784; margin-bottom: 16px; }
    .prize-box { background: rgba(255,215,0,0.08); border: 2px solid rgba(255,215,0,0.4); border-radius: 14px; padding: 20px; text-align: center; margin: 16px 0; }
    .prize-title { font-size: 1.2rem; font-weight: 900; color: #ffd700; margin-bottom: 8px; }
    .prize-desc { font-size: 0.85rem; color: #c8a800; line-height: 1.8; }
    .no-prize-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(100,200,120,0.15); border-radius: 14px; padding: 20px; text-align: center; margin: 16px 0; }
    .no-prize-text { font-size: 0.95rem; color: #81c784; line-height: 1.8; }
    .wrong-list { margin: 16px 0; }
    .wrong-list-title { font-size: 0.85rem; font-weight: 700; color: #e74c3c; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(231,76,60,0.3); }
    .wrong-item { background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .wrong-item-q { font-size: 0.85rem; color: #e8f5e9; font-weight: 700; margin-bottom: 6px; line-height: 1.5; }
    .wrong-item-a { font-size: 0.82rem; color: #2ecc71; }
    .retry-btn { width: 100%; padding: 16px; background: transparent; color: #2ecc71; border: 1px solid #2ecc71; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
    .retry-btn:hover { background: rgba(46,204,113,0.1); }
    .note { font-size: 0.75rem; color: rgba(129,199,132,0.5); text-align: center; margin-top: 14px; line-height: 1.6; }
    .loading-wrap { text-align: center; padding: 40px 0; }
    .loading-icon { font-size: 3rem; display: block; margin-bottom: 12px; animation: spin 1.2s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .loading-text { color: #2ecc71; font-weight: 700; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">

  <!-- TOP -->
  <div id="screen-top" class="card">
    <div class="badge">TESTOSTERONE QUIZ</div>
    <h1>テストステロン<br>クイズ</h1>
    <p class="desc">男性ホルモンに関する20問のクイズです。95%以上正解すると毎月5名にAmazonギフト券500円分が当たる抽選に参加できます！</p>
    <div class="info-box">
      <div class="info-box-title">🎁 プレゼントについて</div>
      <div class="info-box-body">
        正解率95%以上でプレゼント抽選参加！<br>
        毎月5名様にAmazonギフト券500円分<br>
        当選者にはLINEでご連絡します
      </div>
    </div>
    <div class="user-badge" id="user-badge">✅ LINEでログイン済み</div>
    <label class="form-label">📋 年代を選択してください</label>
    <select id="age-group" class="age-select">
      <option value="">--- 選択してください ---</option>
      <option value="20代前半">20代前半（20〜24歳）</option>
      <option value="20代半ば">20代半ば（25〜27歳）</option>
      <option value="20代後半">20代後半（28〜29歳）</option>
      <option value="30代前半">30代前半（30〜34歳）</option>
      <option value="30代半ば">30代半ば（35〜37歳）</option>
      <option value="30代後半">30代後半（38〜39歳）</option>
      <option value="40代前半">40代前半（40〜44歳）</option>
      <option value="40代半ば">40代半ば（45〜47歳）</option>
      <option value="40代後半">40代後半（48〜49歳）</option>
      <option value="50代前半">50代前半（50〜54歳）</option>
      <option value="50代半ば">50代半ば（55〜57歳）</option>
      <option value="50代後半">50代後半（58〜59歳）</option>
      <option value="60代前半">60代前半（60〜64歳）</option>
      <option value="60代半ば">60代半ば（65〜67歳）</option>
      <option value="60代後半">60代後半（68〜69歳）</option>
      <option value="70代前半">70代前半（70〜74歳）</option>
      <option value="70代半ば">70代半ば（75〜77歳）</option>
      <option value="70代後半">70代後半（78〜79歳）</option>
    </select>
    <button class="start-btn" id="start-btn">クイズをはじめる →</button>
    <button class="line-btn" id="line-login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.03 2 11c0 3.08 1.67 5.77 4.19 7.4L5.5 22l3.79-1.97C10.1 20.63 11.03 21 12 21c5.52 0 10-4.03 10-9s-4.48-9-10-9z"/></svg>
      LINEでログインして抽選に参加する
    </button>
    <button class="skip-btn" id="skip-btn">ログインせずに始める（抽選対象外）</button>
    <p class="note">※抽選に参加するにはLINEログインが必要です。</p>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="card" style="display:none">
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label" id="q-progress">問題 1 / 20</div>
        <div class="progress-cat" id="q-cat">-</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="question-block">
      <div class="q-num" id="q-num">Q1</div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="card" style="display:none">
    <div class="loading-wrap">
      <span class="loading-icon">⚙️</span>
      <div class="loading-text">結果を集計中...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="card" style="display:none">
    <div class="badge">RESULT</div>
    <h1>クイズ結果</h1>
    <div class="result-earth" id="result-emoji">🎯</div>
    <div class="result-score"><span id="result-score">0</span> / 20問</div>
    <div class="result-percent" id="result-percent">正解率 0%</div>
    <div id="prize-area"></div>
    <div class="wrong-list" id="wrong-list"></div>
    <p class="note">※このクイズは学習・啓発を目的としています。</p>
    <button class="retry-btn" id="retry-btn">もう一度チャレンジ 🔄</button>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyC8FRMzZkGfKt6E4jxKDzpy32Mjv771tGLYhzLbpteH4AdT63Qx-F9AqgT_C8auJjXcA/exec';
const QUIZ_COUNT = 20;
const PRIZE_THRESHOLD = 95;
const AUTO_NEXT_DELAY = 1200;
const AUTO_NEXT_DELAY_WRONG = 2000;
const LINE_CHANNEL_ID = '2010588724';

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongList = [];
let answered = false;
let lineUid = null;

function getLineUid() {
  return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('line_uid='))?.split('=')[1] || null;
}

window.addEventListener('DOMContentLoaded', () => {
  lineUid = getLineUid();
  if (lineUid) {
    document.getElementById('user-badge').style.display = 'block';
    document.getElementById('line-login-btn').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'none';
  }
});

function lineLogin() {
  const age = document.getElementById('age-group').value;
  if (!age) { alert('年代を選択してください'); return; }
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: LINE_CHANNEL_ID,
    redirect_uri: window.location.origin + '/api/line-callback',
    state: Math.random().toString(36).substring(2),
    scope: 'profile'
  });
  window.location.href = 'https://access.line.me/oauth2/v2.1/authorize?' + params.toString();
}

function checkAndStart() {
  const age = document.getElementById('age-group').value;
  if (!age) { alert('年代を選択してください'); return; }
  startQuiz();
}

function showScreen(id) {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  window.scrollTo(0, 0);
}

async function startQuiz() {
  showScreen('screen-loading');
  document.querySelector('.loading-text').textContent = '問題を読み込み中...';
  try {
    const res = await fetch(GAS_URL + '?action=getQuestions');
    const data = await res.json();
    if (!data.success || !data.questions.length) {
      alert('問題の読み込みに失敗しました。');
      showScreen('screen-top');
      return;
    }
    questions = data.questions;
    currentIndex = 0;
    score = 0;
    wrongList = [];
    showScreen('screen-quiz');
    showQuestion();
  } catch(e) {
    alert('問題の読み込みに失敗しました。');
    showScreen('screen-top');
  }
}

function showQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const pct = (currentIndex / QUIZ_COUNT) * 100;
  document.getElementById('q-progress').textContent = '問題 ' + (currentIndex+1) + ' / ' + QUIZ_COUNT;
  document.getElementById('q-cat').textContent = q.category;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = 'Q' + (currentIndex+1);
  document.getElementById('q-text').textContent = q.question;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  [q.option1, q.option2, q.option3].forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(i+1));
    choicesEl.appendChild(btn);
  });
  document.getElementById('feedback').style.display = 'none';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  const feedback = document.getElementById('feedback');
  btns.forEach(b => b.classList.add('disabled'));
  let delay = AUTO_NEXT_DELAY;
  if (index === q.correct_answer) {
    score++;
    btns[index-1].classList.add('correct');
    feedback.textContent = '✅ 正解！';
    feedback.className = 'feedback correct';
    feedback.style.display = 'block';
  } else {
    btns[index-1].classList.add('wrong');
    wrongList.push({ q: q.question, correct: [q.option1, q.option2, q.option3][q.correct_answer-1] });
    feedback.textContent = '✗ 不正解';
    feedback.className = 'feedback wrong';
    feedback.style.display = 'block';
    delay = AUTO_NEXT_DELAY_WRONG;
  }
  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= QUIZ_COUNT) {
      showResult();
    } else {
      showQuestion();
    }
  }, delay);
}

async function showResult() {
  showScreen('screen-loading');
  document.querySelector('.loading-text').textContent = '結果を集計中...';
  const pct = Math.round((score / QUIZ_COUNT) * 100);
  const isPrize = lineUid && pct >= PRIZE_THRESHOLD;
  const age = document.getElementById('age-group').value;

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'saveResult',
        line_id: lineUid || '未ログイン',
        age: age,
        correct: score,
        percentage: pct
      })
    });
  } catch(e) {
    console.error('保存エラー:', e);
  }

  setTimeout(() => {
    document.getElementById('result-emoji').textContent = pct >= 95 ? '🏆' : pct >= 80 ? '🎯' : pct >= 60 ? '📚' : '💪';
    document.getElementById('result-score').textContent = score;
    document.getElementById('result-percent').textContent = '正解率 ' + pct + '%';

    const prizeArea = document.getElementById('prize-area');
    if (isPrize) {
      prizeArea.innerHTML = '<div class="prize-box"><div class="prize-title">🎉 おめでとうございます！</div><div class="prize-desc">正解率' + pct + '%達成！<br>Amazonギフト券500円分の抽選対象です。<br>当選者にはLINEでご連絡します。</div></div>';
    } else if (!lineUid) {
      prizeArea.innerHTML = '<div class="no-prize-box"><div class="no-prize-text">抽選に参加するには<br>LINEログインが必要です。</div></div>';
    } else {
      prizeArea.innerHTML = '<div class="no-prize-box"><div class="no-prize-text">惜しい！正解率95%以上で<br>抽選対象になります。<br>次回またチャレンジしてください！</div></div>';
    }

    const wrongEl = document.getElementById('wrong-list');
    if (wrongList.length > 0) {
      wrongEl.innerHTML = '<div class="wrong-list-title">❌ 不正解だった問題（' + wrongList.length + '問）</div>'
        + wrongList.map(w =>
          '<div class="wrong-item"><div class="wrong-item-q">Q. ' + w.q + '</div><div class="wrong-item-a">✅ 正解：' + w.correct + '</div></div>'
        ).join('');
    } else {
      wrongEl.innerHTML = '<div style="text-align:center;color:#2ecc71;font-weight:700;padding:12px;">🎉 全問正解！素晴らしい！</div>';
    }

    showScreen('screen-result');
  }, 1000);
}

document.getElementById('start-btn').addEventListener('click', checkAndStart);
document.getElementById('line-login-btn').addEventListener('click', lineLogin);
document.getElementById('skip-btn').addEventListener('click', checkAndStart);
document.getElementById('retry-btn').addEventListener('click', () => location.reload());
</script>
</body>
</html>
